<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- Obsidian tile so the neon rings glow -->
  <rect width="108" height="108" rx="22" fill="#0F1118"/>
  <!-- Vitality tri-ring: sleep (magenta) / move (lime) / recovery (cyan) -->
  <g fill="none" stroke-linecap="round" stroke-width="9" transform="rotate(-90 54 54)">
    <circle cx="54" cy="54" r="36" stroke="#FF3AD8" stroke-dasharray="172 999"/>
    <circle cx="54" cy="54" r="25" stroke="#5DFF3B" stroke-dasharray="110 999"/>
    <circle cx="54" cy="54" r="14" stroke="#28E6FF" stroke-dasharray="72 999"/>
  </g>
</svg>
