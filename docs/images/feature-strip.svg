<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200" role="img" aria-label="feature strip">
  <style>
    .ft-title { font-family: 'Geist', 'Helvetica Neue', system-ui, sans-serif; font-weight: 600; font-size: 14px; fill: #E2E8F0; letter-spacing: -0.01em; }
    .ft-sub   { font-family: 'Geist', system-ui, sans-serif; font-size: 11px; fill: #94A3B8; }
    .tile     { fill: #131A24; stroke: rgba(148,163,184,0.10); stroke-width: 1; }
  </style>
  <rect width="880" height="200" fill="#0B1018"/>

  <!-- 1. Sync -->
  <g transform="translate(20,30)">
    <rect width="200" height="140" rx="14" class="tile"/>
    <g transform="translate(20,22)" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M0,12 L8,4 L16,12"/>
      <path d="M8,4 L8,28"/>
      <path d="M28,16 L20,24 L36,24"/>
    </g>
    <text x="20" y="92" class="ft-title">Pixel Watch → backend</text>
    <text x="20" y="112" class="ft-sub">Health Connect, 15-min worker,</text>
    <text x="20" y="126" class="ft-sub">heartbeat status to dashboard</text>
  </g>

  <!-- 2. Insights -->
  <g transform="translate(240,30)">
    <rect width="200" height="140" rx="14" class="tile"/>
    <g transform="translate(20,20)" stroke="#A78BFA" stroke-width="2" fill="none">
      <circle cx="6"  cy="22" r="2.5" fill="#A78BFA"/>
      <circle cx="14" cy="14" r="2.5" fill="#A78BFA"/>
      <circle cx="22" cy="18" r="2.5" fill="#A78BFA"/>
      <circle cx="30" cy="6"  r="2.5" fill="#A78BFA"/>
      <line x1="0" y1="28" x2="34" y2="2" stroke-dasharray="2,2"/>
    </g>
    <text x="20" y="92" class="ft-title">Story-first insights</text>
    <text x="20" y="112" class="ft-sub">Auto-found correlations,</text>
    <text x="20" y="126" class="ft-sub">plain-English effect sentences</text>
  </g>

  <!-- 3. Sober -->
  <g transform="translate(460,30)">
    <rect width="200" height="140" rx="14" class="tile"/>
    <g transform="translate(20,18)" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M16,2 a14,14 0 1,1 -1,0"/>
      <path d="M14,2 L20,2"/>
      <path d="M16,2 L16,8"/>
    </g>
    <text x="20" y="92" class="ft-title">Sober time tracking</text>
    <text x="20" y="112" class="ft-sub">Live counter on phone + web,</text>
    <text x="20" y="126" class="ft-sub">history, streak distribution</text>
  </g>

  <!-- 4. Self-host -->
  <g transform="translate(680,30)">
    <rect width="180" height="140" rx="14" class="tile"/>
    <g transform="translate(20,20)" stroke="#38BDF8" stroke-width="2" fill="none">
      <rect x="0" y="0"  width="32" height="6" rx="1.5"/>
      <rect x="0" y="10" width="32" height="6" rx="1.5"/>
      <rect x="0" y="20" width="32" height="6" rx="1.5"/>
      <circle cx="4" cy="3"  r="0.8" fill="#22C55E"/>
      <circle cx="4" cy="13" r="0.8" fill="#22C55E"/>
      <circle cx="4" cy="23" r="0.8" fill="#22C55E"/>
    </g>
    <text x="20" y="92" class="ft-title">Self-hosted, single user</text>
    <text x="20" y="112" class="ft-sub">FastAPI + TimescaleDB,</text>
    <text x="20" y="126" class="ft-sub">Docker Compose on Proxmox</text>
  </g>
</svg>
